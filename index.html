<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhishek Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Rajdhani', sans-serif;
  background:#050505;
  color:#ccc;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  background:#0d0d0d;
  border-bottom:1px solid #222;
}

nav a {
  color:#00ffcc;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1 {
  font-family:Orbitron;
  font-size:3rem;
  color:#00ffcc;
}

.hero p {
  color:#888;
}

/* IMAGE */
.profile {
  margin-top:30px;
}

.profile img {
  width:220px;
  height:220px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffcc;
  box-shadow:0 0 40px #00ffcc;
  transition:0.3s;
}

.profile img:hover {
  transform:scale(1.05);
  box-shadow:0 0 60px #00ffcc;
}

/* SECTIONS */
section {
  padding:60px 10%;
}

h2 {
  color:#00ffcc;
  font-family:Orbitron;
  margin-bottom:20px;
}

/* CARDS */
.card {
  background:#0d0d0d;
  padding:20px;
  margin:10px 0;
  border:1px solid #222;
  transition:0.3s;
}

.card:hover {
  border-color:#00ffcc;
  box-shadow:0 0 15px #00ffcc44;
}

/* CONTACT */
input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#111;
  border:1px solid #222;
  color:white;
}

button {
  background:#00ffcc;
  padding:12px 20px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover {
  background:#00ddb3;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>ABHISHEK U</h1>
  <p>Cybersecurity | Full Stack Developer</p>

  <div class="profile">
    <img src="images/profile.jpg" alt="Profile">
  </div>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <div class="card">
    I am a BCA student passionate about cybersecurity and web development.
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <div class="card">HTML, CSS, JavaScript</div>
  <div class="card">Node.js, Express</div>
  <div class="card">PostgreSQL</div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>
</section>

<script>
const BACKEND_URL = "https://your-backend.onrender.com/api/contact";

document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    name: name.value,
    email: email.value,
    message: message.value
  };

  try{
    const res = await fetch(BACKEND_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    if(res.ok){
      status.innerText = "Message Sent!";
      this.reset();
    } else {
      status.innerText = "Error!";
    }
  }catch{
    status.innerText = "Server Error";
  }
});
</script>

</body>
</html>
